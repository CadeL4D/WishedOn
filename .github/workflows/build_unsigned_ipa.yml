name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        # Using --no-codesign to prevent requiring an Apple Developer account/certificates during the build
        run: flutter build ios --release --no-codesign

      - name: Package to IPA
        # An IPA is just a zip containing a 'Payload' folder with the '.app' inside
        run: |
          mkdir Payload
          # The app name defaults to Runner.app in Flutter iOS projects
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qr app.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app.ipa
